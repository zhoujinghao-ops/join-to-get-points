<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Birthday at Parc Oasis, Lounge Room</title>
    <style>
:root {
  color-scheme: light;
  --ink: #1e2026;
  --muted: #64636d;
  --paper: #fbfaf7;
  --line: #ded9ce;
  --coral: #df5c4e;
  --plum: #4a304f;
  --mint: #d7eadf;
  --gold: #c99a3a;
  --shadow: 0 24px 60px rgba(44, 37, 31, 0.16);
}

* {
  box-sizing: border-box;
}

html {
  scroll-behavior: smooth;
}

body {
  margin: 0;
  min-height: 100svh;
  background:
    linear-gradient(135deg, rgba(255, 248, 232, 0.92) 0 34%, rgba(215, 234, 223, 0.88) 34% 68%, rgba(255, 254, 251, 0.96) 68%),
    var(--paper);
  color: var(--ink);
  font-family: Inter, Avenir, "Helvetica Neue", Arial, sans-serif;
}

body::before {
  position: fixed;
  inset: 0;
  background:
    linear-gradient(90deg, rgba(74, 48, 79, 0.08), transparent 38%),
    linear-gradient(0deg, rgba(223, 92, 78, 0.1), transparent 45%);
  content: "";
  pointer-events: none;
}

img {
  display: block;
  max-width: 100%;
}

.site-nav {
  position: fixed;
  top: 14px;
  left: 50%;
  z-index: 10;
  width: min(1120px, calc(100% - 28px));
  min-height: 52px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 16px;
  padding: 8px 10px 8px 16px;
  border: 1px solid rgba(255, 255, 255, 0.54);
  border-radius: 8px;
  background: rgba(255, 254, 251, 0.78);
  box-shadow: 0 18px 36px rgba(31, 26, 30, 0.12);
  backdrop-filter: blur(14px);
  transform: translateX(-50%);
}

.site-nav a {
  color: var(--plum);
  font-size: 0.9rem;
  font-weight: 800;
  text-decoration: none;
}

.site-nav__brand {
  white-space: nowrap;
}

.site-nav div {
  display: flex;
  flex-wrap: wrap;
  justify-content: flex-end;
  gap: 4px;
}

.site-nav div a {
  padding: 8px 10px;
  border-radius: 6px;
}

.site-nav div a:hover,
.site-nav div a[aria-current="page"] {
  background: var(--mint);
}

.hero {
  position: relative;
  min-height: 88svh;
  display: grid;
  align-items: end;
  overflow: hidden;
  padding: clamp(24px, 5vw, 64px);
}

.hero__image,
.hero__shade {
  position: absolute;
  inset: 0;
}

.hero__image {
  width: 100%;
  height: 100%;
  object-fit: cover;
  transform: scale(1.04);
  animation: slow-drift 18s ease-in-out infinite alternate;
}

.hero__shade {
  background:
    linear-gradient(90deg, rgba(20, 13, 18, 0.75) 0%, rgba(20, 13, 18, 0.46) 46%, rgba(20, 13, 18, 0.12) 100%),
    linear-gradient(0deg, rgba(20, 13, 18, 0.48), rgba(20, 13, 18, 0.08) 46%);
}

.hero__content {
  position: relative;
  z-index: 1;
  width: min(760px, 100%);
  color: white;
  padding-bottom: clamp(16px, 5vh, 52px);
  animation: rise-in 900ms ease-out both;
}

.kicker {
  margin: 0 0 16px;
  color: #ffe6b6;
  font-size: 0.78rem;
  font-weight: 800;
  letter-spacing: 0;
  text-transform: uppercase;
}

.kicker--dark {
  color: var(--coral);
}

h1,
h2 {
  margin: 0;
  font-family: Georgia, "Times New Roman", serif;
  line-height: 0.95;
}

h1 {
  max-width: 900px;
  font-size: clamp(2.8rem, 6.2vw, 5.6rem);
  text-wrap: balance;
}

h2 {
  max-width: 460px;
  font-size: clamp(2rem, 5vw, 4.6rem);
}

.hero__copy {
  max-width: 540px;
  margin: 22px 0 0;
  color: rgba(255, 255, 255, 0.88);
  font-size: clamp(1.05rem, 2vw, 1.35rem);
  line-height: 1.6;
}

.hero__actions {
  display: flex;
  flex-wrap: wrap;
  gap: 12px;
  margin-top: 30px;
}

.button {
  min-height: 48px;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  padding: 0 22px;
  border: 1px solid rgba(255, 255, 255, 0.56);
  border-radius: 6px;
  background: white;
  color: var(--plum);
  font-weight: 800;
  text-decoration: none;
  box-shadow: 0 12px 24px rgba(0, 0, 0, 0.16);
  transition: transform 180ms ease, box-shadow 180ms ease, background 180ms ease;
}

.button--ghost {
  background: rgba(255, 255, 255, 0.1);
  color: white;
  backdrop-filter: blur(10px);
}

.button--paper {
  border-color: var(--line);
  background: #fffefb;
  color: var(--plum);
}

.button:hover {
  transform: translateY(-3px);
  box-shadow: 0 18px 34px rgba(0, 0, 0, 0.22);
}

.rsvp {
  width: min(420px, 100%);
  display: grid;
  gap: 12px;
  margin-top: 30px;
  padding: 18px;
  border: 1px solid rgba(255, 255, 255, 0.28);
  border-radius: 8px;
  background: rgba(255, 255, 255, 0.1);
  backdrop-filter: blur(10px);
}

.rsvp p {
  margin: 0;
  color: rgba(255, 255, 255, 0.9);
  font-weight: 800;
}

.rsvp__buttons {
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
}

.rsvp__buttons .button {
  border-color: rgba(255, 255, 255, 0.56);
}

.rsvp__buttons .button[aria-pressed="true"] {
  outline: 3px solid rgba(255, 230, 182, 0.72);
  outline-offset: 3px;
}

.rsvp__message {
  min-height: 1.45em;
  font-size: 0.95rem;
}

.confetti {
  position: absolute;
  inset: 0;
  z-index: 1;
  pointer-events: none;
  overflow: hidden;
}

.confetti span {
  position: absolute;
  top: -12%;
  width: 10px;
  height: 18px;
  border-radius: 2px;
  background: var(--gold);
  opacity: 0.78;
  animation: confetti-fall 7s linear infinite;
}

.confetti span:nth-child(1) {
  left: 8%;
  background: #ffe6b6;
  animation-delay: -1.2s;
}

.confetti span:nth-child(2) {
  left: 16%;
  background: var(--coral);
  animation-delay: -4.8s;
  animation-duration: 8.4s;
}

.confetti span:nth-child(3) {
  left: 25%;
  background: var(--mint);
  animation-delay: -3.1s;
  animation-duration: 6.6s;
}

.confetti span:nth-child(4) {
  left: 34%;
  background: #ffffff;
  animation-delay: -6s;
  animation-duration: 9s;
}

.confetti span:nth-child(5) {
  left: 43%;
  background: var(--gold);
  animation-delay: -2.4s;
  animation-duration: 7.7s;
}

.confetti span:nth-child(6) {
  left: 52%;
  background: var(--coral);
  animation-delay: -5.6s;
}

.confetti span:nth-child(7) {
  left: 61%;
  background: #ffe6b6;
  animation-delay: -0.6s;
  animation-duration: 8.8s;
}

.confetti span:nth-child(8) {
  left: 70%;
  background: var(--mint);
  animation-delay: -4.2s;
  animation-duration: 6.9s;
}

.confetti span:nth-child(9) {
  left: 79%;
  background: #ffffff;
  animation-delay: -2.8s;
}

.confetti span:nth-child(10) {
  left: 87%;
  background: var(--gold);
  animation-delay: -6.5s;
  animation-duration: 9.3s;
}

.confetti span:nth-child(11) {
  left: 93%;
  background: var(--coral);
  animation-delay: -3.7s;
  animation-duration: 7.4s;
}

.confetti span:nth-child(12) {
  left: 4%;
  background: var(--mint);
  animation-delay: -5.1s;
  animation-duration: 8.1s;
}

.details {
  width: min(1120px, calc(100% - 32px));
  margin: -42px auto 0;
  position: relative;
  z-index: 2;
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 1px;
  overflow: hidden;
  border: 1px solid var(--line);
  border-radius: 8px;
  background: var(--line);
  box-shadow: var(--shadow);
}

.detail {
  min-height: 130px;
  display: grid;
  align-content: center;
  gap: 10px;
  padding: 28px;
  background: #fffefb;
  animation: float-card 5.5s ease-in-out infinite;
}

.detail--link {
  color: inherit;
  text-decoration: none;
  transition: transform 180ms ease, background 180ms ease;
}

.detail--link:hover {
  background: #fff8e8;
}

.detail:nth-child(2) {
  animation-delay: -1.4s;
}

.detail:nth-child(3) {
  animation-delay: -2.8s;
}

.detail__label {
  color: var(--muted);
  font-size: 0.78rem;
  font-weight: 800;
  letter-spacing: 0;
  text-transform: uppercase;
}

.detail strong {
  color: var(--plum);
  font-size: clamp(1.25rem, 2vw, 1.75rem);
}

.section {
  width: min(1120px, calc(100% - 32px));
  margin: clamp(64px, 10vw, 120px) auto;
}

.section--split {
  display: grid;
  grid-template-columns: minmax(260px, 0.85fr) minmax(280px, 1.15fr);
  gap: clamp(32px, 6vw, 80px);
  align-items: start;
}

.timeline {
  display: grid;
  gap: 16px;
}

.timeline article {
  display: grid;
  grid-template-columns: 48px 1fr;
  column-gap: 18px;
  padding: 24px 0;
  border-top: 1px solid var(--line);
  animation: fade-up linear both;
  animation-timeline: view();
  animation-range: entry 0% cover 34%;
}

.timeline article:last-child {
  border-bottom: 1px solid var(--line);
}

.timeline span {
  width: 48px;
  height: 48px;
  display: grid;
  place-items: center;
  border-radius: 50%;
  background: var(--mint);
  color: var(--plum);
  font-weight: 800;
  animation: soft-pulse 2.8s ease-in-out infinite;
}

.timeline h3 {
  margin: 0;
  color: var(--plum);
  font-size: 1.2rem;
}

.timeline p {
  grid-column: 2;
  margin: 8px 0 0;
  color: var(--muted);
  line-height: 1.65;
}

.note {
  width: min(980px, calc(100% - 32px));
  margin: 0 auto 56px;
  padding: clamp(34px, 7vw, 72px);
  border-radius: 8px;
  background:
    linear-gradient(135deg, rgba(215, 234, 223, 0.9), rgba(255, 247, 222, 0.92)),
    #fffefb;
  border: 1px solid var(--line);
  animation: glow-note 4s ease-in-out infinite alternate;
}

.note--page {
  width: 100%;
  margin: 0;
}

blockquote {
  margin: 0;
  color: var(--plum);
  font-family: Georgia, "Times New Roman", serif;
  font-size: clamp(2rem, 4.5vw, 4.2rem);
  line-height: 1.08;
  text-wrap: balance;
}

.page-shell {
  position: relative;
  z-index: 1;
  width: min(1040px, calc(100% - 32px));
  min-height: 100svh;
  display: grid;
  align-content: center;
  gap: clamp(28px, 6vw, 54px);
  margin: 0 auto;
  padding: 112px 0 56px;
}

.page-shell::before {
  position: absolute;
  inset: 88px -18px 34px;
  z-index: -1;
  border: 1px solid rgba(255, 255, 255, 0.64);
  border-radius: 8px;
  background: rgba(255, 254, 251, 0.58);
  box-shadow: 0 28px 70px rgba(74, 48, 79, 0.12);
  content: "";
}

.page-hero {
  display: grid;
  gap: 18px;
  animation: rise-in 800ms ease-out both;
}

.page-hero h1 {
  max-width: 900px;
  color: var(--plum);
}

.page-hero p {
  max-width: 620px;
  margin: 0;
  color: var(--muted);
  font-size: clamp(1.05rem, 2vw, 1.32rem);
  line-height: 1.7;
}

.page-card {
  display: grid;
  gap: 12px;
  padding: clamp(28px, 6vw, 56px);
  border: 1px solid var(--line);
  border-radius: 8px;
  background: rgba(255, 254, 251, 0.92);
  box-shadow: var(--shadow);
  animation: float-card 5.5s ease-in-out infinite;
}

.page-card strong {
  color: var(--plum);
  font-family: Georgia, "Times New Roman", serif;
  font-size: clamp(2.4rem, 8vw, 6.2rem);
  line-height: 0.96;
  text-wrap: balance;
}

.page-timeline {
  max-width: 760px;
}

.next-links {
  display: flex;
  flex-wrap: wrap;
  gap: 12px;
}

@keyframes slow-drift {
  from {
    transform: scale(1.04) translate3d(-1.2%, -0.8%, 0);
  }

  to {
    transform: scale(1.09) translate3d(1.2%, 0.8%, 0);
  }
}

@keyframes rise-in {
  from {
    opacity: 0;
    transform: translateY(28px);
  }

  to {
    opacity: 1;
    transform: translateY(0);
  }
}

@keyframes confetti-fall {
  0% {
    transform: translate3d(0, -10vh, 0) rotate(0deg);
  }

  100% {
    transform: translate3d(34px, 112vh, 0) rotate(540deg);
  }
}

@keyframes float-card {
  0%,
  100% {
    transform: translateY(0);
  }

  50% {
    transform: translateY(-8px);
  }
}

@keyframes fade-up {
  from {
    opacity: 0;
    transform: translateY(24px);
  }

  to {
    opacity: 1;
    transform: translateY(0);
  }
}

@keyframes soft-pulse {
  0%,
  100% {
    box-shadow: 0 0 0 0 rgba(201, 154, 58, 0);
  }

  50% {
    box-shadow: 0 0 0 8px rgba(201, 154, 58, 0.16);
  }
}

@keyframes glow-note {
  from {
    box-shadow: 0 20px 44px rgba(74, 48, 79, 0.08);
  }

  to {
    box-shadow: 0 28px 70px rgba(223, 92, 78, 0.18);
  }
}

@media (max-width: 760px) {
  .hero {
    min-height: 82svh;
    padding: 22px;
    padding-top: 96px;
  }

  .hero__shade {
    background:
      linear-gradient(0deg, rgba(20, 13, 18, 0.76), rgba(20, 13, 18, 0.2) 70%),
      linear-gradient(90deg, rgba(20, 13, 18, 0.52), rgba(20, 13, 18, 0.08));
  }

  h1 {
    font-size: clamp(2.35rem, 11vw, 3.5rem);
  }

  .details,
  .section--split {
    grid-template-columns: 1fr;
  }

  .details {
    margin-top: 0;
    width: 100%;
    border-radius: 0;
    border-left: 0;
    border-right: 0;
  }

  .detail {
    min-height: 108px;
  }

  .site-nav {
    align-items: flex-start;
    flex-direction: column;
  }

  .site-nav div {
    justify-content: flex-start;
  }

  .page-shell {
    padding-top: 152px;
  }

  .timeline article {
    grid-template-columns: 42px 1fr;
  }

  .timeline span {
    width: 42px;
    height: 42px;
  }

  .timeline p {
    grid-column: 1 / -1;
  }
}

@media (prefers-reduced-motion: reduce) {
  *,
  *::before,
  *::after {
    animation-duration: 1ms !important;
    animation-iteration-count: 1 !important;
    scroll-behavior: auto !important;
    transition-duration: 1ms !important;
  }

  .confetti {
    display: none;
  }
}

      .back-to-points { position: fixed; right: 18px; bottom: 18px; z-index: 12; }
      .rsvp-page__links .button:first-child {
        border-color: var(--plum);
        background: var(--plum);
        color: white;
      }
    </style>
  </head>
  <body>
    <nav class="site-nav" aria-label="Birthday pages">
      <a class="site-nav__brand" href="birthday.html">Birthday</a>
      <div>
        <a href="date.html">Date</a>
        <a href="place.html" aria-current="page">Place</a>
        <a href="mood.html">Mood</a>
        <a href="plan.html">Plan</a>
        <a href="note.html">Note</a>
      </div>
    </nav>
    <main>
      <section class="page-shell" id="place" data-page="place">
        <div class="page-hero">
          <p class="kicker kicker--dark">Place</p>
          <h1>Parc Oasis, 609775</h1>
          <p>Meet at the Lounge Room near the swimming pool.</p>
        </div>
        <div class="page-card"><span class="detail__label">Venue</span><strong>Parc Oasis, 609775, Lounge Room (near swimming pool)</strong></div>
      </section>

      <div class="rsvp-page__links" style="position: relative; z-index: 2; max-width: 1180px; margin: -30px auto 70px; padding: 0 22px;">
        <a class="button" href="birthday.html">Back to birthday</a>
        <a class="button button--paper" href="index.html">Back to points</a>
      </div>
    </main>
  </body>
</html>
