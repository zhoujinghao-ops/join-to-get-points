<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Join to Get Points</title>
    <style>
      :root {
        --bg: #ffffff;
        --bg2: #f8fafc;
        --panel: rgba(255, 255, 255, 0.94);
        --panel-strong: rgba(255, 255, 255, 0.98);
        --panel-soft: rgba(15, 23, 42, 0.04);
        --line: rgba(15, 23, 42, 0.13);
        --line-strong: rgba(15, 23, 42, 0.2);
        --text: #0f172a;
        --muted: #475569;
        --soft: #64748b;
        --accent: #f59e0b;
        --accent-2: #22c55e;
        --accent-3: #38bdf8;
        --danger: #fb7185;
        --shadow: 0 20px 55px rgba(15, 23, 42, 0.12);
        --radius-xl: 28px;
        --radius-lg: 22px;
        --radius-md: 18px;
        --radius-sm: 14px;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        min-height: 100%;
        color: var(--text);
        background: #ffffff;
        font-family:
          "Trebuchet MS",
          "Verdana",
          "Gill Sans",
          sans-serif;
      }

      body::before {
        content: "";
        position: fixed;
        inset: 0;
        pointer-events: none;
        background:
          linear-gradient(rgba(15, 23, 42, 0.035) 1px, transparent 1px),
          linear-gradient(90deg, rgba(15, 23, 42, 0.035) 1px, transparent 1px);
        background-size: 28px 28px;
        mask-image: linear-gradient(to bottom, rgba(0, 0, 0, 0.45), transparent 92%);
      }

      button,
      input {
        font: inherit;
      }

      button {
        cursor: pointer;
      }

      .app {
        position: relative;
        min-height: 100vh;
        padding: 24px;
      }

      .shell {
        max-width: 1380px;
        margin: 0 auto;
      }

      .topbar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
        padding: 18px 22px;
        margin-bottom: 20px;
        border: 1px solid var(--line);
        border-radius: var(--radius-xl);
        background: linear-gradient(180deg, rgba(15, 23, 42, 0.88), rgba(15, 23, 42, 0.64));
        box-shadow: var(--shadow);
        backdrop-filter: blur(18px);
      }

      .brand {
        display: flex;
        align-items: center;
        gap: 16px;
      }

      .brand-mark {
        width: 52px;
        height: 52px;
        border-radius: 18px;
        display: grid;
        place-items: center;
        font-size: 28px;
        color: #111827;
        background:
          radial-gradient(circle at 30% 30%, #fff7ed, #fbbf24 42%, #f59e0b 85%);
        box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.45);
      }

      .brand h1 {
        margin: 0;
        font-family: Georgia, "Times New Roman", serif;
        font-size: clamp(1.4rem, 2.4vw, 2rem);
        letter-spacing: 0.02em;
      }

      .brand p {
        margin: 2px 0 0;
        color: var(--muted);
        font-size: 0.95rem;
      }

      .topbar-actions {
        display: flex;
        align-items: center;
        gap: 10px;
      }

      .pill {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 10px 14px;
        border-radius: 999px;
        border: 1px solid var(--line);
        color: var(--muted);
        background: rgba(255, 255, 255, 0.03);
      }

      .birthday-link {
        display: inline-flex;
        align-items: center;
        min-height: 42px;
        padding: 0 14px;
        border-radius: 999px;
        border: 1px solid rgba(245, 158, 11, 0.42);
        color: #fff7ed;
        background: linear-gradient(135deg, rgba(245, 158, 11, 0.34), rgba(34, 197, 94, 0.2));
        font-weight: 800;
        text-decoration: none;
      }

      .credit {
        margin: 18px 0 0;
        text-align: center;
        color: var(--muted);
        font-size: 0.9rem;
      }

      .menu-trigger {
        width: 46px;
        height: 46px;
        border-radius: 16px;
        border: 1px solid var(--line);
        background: rgba(255, 255, 255, 0.06);
        color: var(--text);
        font-size: 1.4rem;
      }

      .dropdown {
        position: absolute;
        right: 24px;
        top: 88px;
        min-width: 240px;
        padding: 10px;
        border-radius: 20px;
        border: 1px solid var(--line);
        background: rgba(15, 23, 42, 0.98);
        box-shadow: var(--shadow);
        z-index: 40;
      }

      .dropdown button {
        width: 100%;
        text-align: left;
        padding: 12px 14px;
        margin: 4px 0;
        border: 0;
        border-radius: 14px;
        color: var(--text);
        background: transparent;
      }

      .dropdown button:hover {
        background: rgba(255, 255, 255, 0.07);
      }

      .frame {
        border: 1px solid var(--line);
        border-radius: var(--radius-xl);
        background:
          linear-gradient(180deg, rgba(15, 23, 42, 0.86), rgba(15, 23, 42, 0.64));
        box-shadow: var(--shadow);
        backdrop-filter: blur(18px);
      }

      .hero {
        padding: clamp(22px, 3vw, 34px);
      }

      .hero-grid {
        display: grid;
        grid-template-columns: minmax(0, 1.15fr) minmax(320px, 0.85fr);
        gap: 18px;
      }

      .hero-copy h2 {
        margin: 0 0 10px;
        font-family: Georgia, "Times New Roman", serif;
        font-size: clamp(2rem, 4vw, 4.2rem);
        line-height: 0.96;
      }

      .hero-copy p {
        max-width: 66ch;
        margin: 0 0 18px;
        color: var(--muted);
        font-size: 1rem;
        line-height: 1.6;
      }

      .choice-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 14px;
        margin-top: 20px;
      }

      .choice-card,
      .mini-card,
      .reward-card,
      .player-card,
      .stage-card,
      .stats-card,
      .stage-tile,
      .person-row,
      .detail-card {
        border: 1px solid var(--line);
        background: rgba(255, 255, 255, 0.05);
        box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.05);
      }

      .choice-card {
        display: flex;
        flex-direction: column;
        justify-content: space-between;
        min-height: 180px;
        padding: 18px;
        border-radius: 24px;
        transition: transform 180ms ease, border-color 180ms ease, background 180ms ease;
      }

      .choice-card:hover {
        transform: translateY(-3px);
        border-color: rgba(245, 158, 11, 0.38);
        background: rgba(255, 255, 255, 0.08);
      }

      .choice-title {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
        font-size: 1.22rem;
        font-weight: 700;
      }

      .choice-title span:first-child {
        display: inline-flex;
        align-items: center;
        gap: 10px;
      }

      .choice-card p {
        margin: 10px 0 0;
        color: var(--muted);
        line-height: 1.5;
      }

      .choice-footer {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        margin-top: 18px;
      }

      .cta {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 10px;
        min-height: 48px;
        padding: 0 18px;
        border: 1px solid transparent;
        border-radius: 16px;
        font-weight: 700;
        color: #111827;
        background: linear-gradient(135deg, #fde68a, #f59e0b);
        box-shadow: 0 12px 30px rgba(245, 158, 11, 0.24);
        transition: transform 160ms ease, filter 160ms ease;
      }

      .cta:hover {
        transform: translateY(-1px);
        filter: brightness(1.04);
      }

      .secondary {
        color: var(--text);
        border-color: var(--line);
        background: rgba(255, 255, 255, 0.05);
        box-shadow: none;
      }

      .pause-toggle {
        border-color: rgba(251, 113, 133, 0.42);
        background: rgba(251, 113, 133, 0.14);
      }

      .tag.paused {
        border-color: rgba(251, 113, 133, 0.55);
        color: #fecdd3;
        background: rgba(251, 113, 133, 0.16);
      }

      .ghost {
        color: var(--text);
        border-color: var(--line);
        background: transparent;
      }

      .panel {
        padding: 20px;
        border-radius: 24px;
      }

      .form-grid {
        display: grid;
        gap: 14px;
      }

      .field {
        display: grid;
        gap: 8px;
      }

      .field label {
        color: var(--muted);
        font-size: 0.92rem;
      }

      .field input {
        width: 100%;
        min-height: 50px;
        padding: 0 16px;
        border-radius: 16px;
        border: 1px solid var(--line);
        color: var(--text);
        background: rgba(255, 255, 255, 0.04);
        outline: none;
      }

      .field input:focus {
        border-color: rgba(56, 189, 248, 0.55);
        box-shadow: 0 0 0 4px rgba(56, 189, 248, 0.12);
      }

      .hint {
        color: var(--soft);
        font-size: 0.9rem;
        line-height: 1.55;
      }

      .split {
        display: grid;
        grid-template-columns: minmax(0, 1.2fr) minmax(320px, 0.8fr);
        gap: 18px;
        align-items: start;
      }

      .stack {
        display: grid;
        gap: 16px;
      }

      .section-title {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
        margin-bottom: 14px;
      }

      .section-title h3 {
        margin: 0;
        font-size: 1.15rem;
        letter-spacing: 0.02em;
      }

      .section-title small {
        color: var(--soft);
      }

      .group {
        display: grid;
        gap: 14px;
      }

      .grid-players {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(176px, 1fr));
        gap: 14px;
      }

      .player-card {
        padding: 16px;
        border-radius: 22px;
        cursor: pointer;
        color: var(--text);
        transition: transform 160ms ease, border-color 160ms ease, background 160ms ease;
      }

      .player-card:hover {
        transform: translateY(-2px);
        border-color: rgba(56, 189, 248, 0.42);
        background: rgba(255, 255, 255, 0.08);
      }

      .player-card.active {
        border-color: rgba(245, 158, 11, 0.5);
        background: rgba(245, 158, 11, 0.09);
      }

      .player-top {
        display: flex;
        align-items: center;
        gap: 14px;
      }

      .avatar {
        width: 56px;
        height: 56px;
        border-radius: 50%;
        display: grid;
        place-items: center;
        flex: 0 0 auto;
        color: #111827;
        font-weight: 800;
        letter-spacing: 0.04em;
        background: linear-gradient(135deg, #fde68a, #fb923c 60%, #f59e0b);
        box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.35);
      }

      .avatar.host {
        background: linear-gradient(135deg, #bae6fd, #38bdf8 65%, #0ea5e9);
      }

      .player-card h4 {
        margin: 0;
        font-size: 1rem;
        color: var(--text);
      }

      .meta {
        margin-top: 4px;
        color: var(--soft);
        font-size: 0.88rem;
      }

      .chip-row {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        margin-top: 12px;
      }

      .chip {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        min-height: 30px;
        padding: 0 10px;
        border-radius: 999px;
        border: 1px solid var(--line);
        color: var(--muted);
        background: rgba(255, 255, 255, 0.04);
        font-size: 0.82rem;
      }

      .chip.green {
        color: #bbf7d0;
        border-color: rgba(34, 197, 94, 0.28);
        background: rgba(34, 197, 94, 0.09);
      }

      .chip.blue {
        color: #bae6fd;
        border-color: rgba(56, 189, 248, 0.26);
        background: rgba(56, 189, 248, 0.08);
      }

      .chip.amber {
        color: #fcd34d;
        border-color: rgba(245, 158, 11, 0.3);
        background: rgba(245, 158, 11, 0.1);
      }

      .chip.rose {
        color: #fda4af;
        border-color: rgba(251, 113, 133, 0.3);
        background: rgba(251, 113, 133, 0.09);
      }

      .stats-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 12px;
      }

      .stats-card {
        padding: 16px;
        border-radius: 20px;
      }

      .stats-card strong {
        display: block;
        font-size: 1.08rem;
        margin-top: 4px;
      }

      .stats-card small {
        color: var(--soft);
      }

      .detail-card {
        border-radius: 24px;
        padding: 18px;
      }

      .detail-card h3,
      .detail-card h4 {
        margin: 0;
      }

      .detail-head {
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        gap: 12px;
        margin-bottom: 16px;
      }

      .detail-head p {
        margin: 8px 0 0;
        color: var(--muted);
        line-height: 1.55;
      }

      .icon-btn {
        width: 44px;
        height: 44px;
        border-radius: 14px;
        border: 1px solid var(--line);
        color: var(--text);
        background: rgba(255, 255, 255, 0.05);
      }

      .detail-actions {
        display: grid;
        gap: 12px;
        margin-top: 16px;
      }

      .action-row {
        display: grid;
        grid-template-columns: 1fr auto;
        gap: 10px;
        align-items: end;
      }

      .action-row .field {
        gap: 6px;
      }

      .action-row .field input {
        min-height: 46px;
      }

      .wide {
        width: 100%;
      }

      .button-row {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
      }

      .button-row .cta,
      .button-row .secondary,
      .button-row .ghost {
        min-height: 44px;
      }

      .stage-rail {
        display: grid;
        gap: 12px;
      }

      .stage-start {
        padding: 16px;
        border-radius: 24px;
        border: 1px solid var(--line);
        background: rgba(255, 255, 255, 0.05);
        display: grid;
        gap: 12px;
      }

      .stage-start .stage-number {
        font-size: 1rem;
      }

      .stage-grid {
        display: grid;
        grid-template-columns: repeat(4, minmax(0, 1fr));
        gap: 12px;
      }

      .stage-tile {
        min-height: 118px;
        border-radius: 22px;
        padding: 14px;
        display: flex;
        flex-direction: column;
        justify-content: space-between;
        text-align: left;
        color: var(--text);
        background: linear-gradient(180deg, rgba(255, 255, 255, 0.055), rgba(255, 255, 255, 0.03));
        transition: transform 160ms ease, border-color 160ms ease, background 160ms ease;
      }

      .stage-tile:hover {
        transform: translateY(-2px);
        border-color: rgba(245, 158, 11, 0.38);
      }

      .stage-tile.bright {
        background:
          radial-gradient(circle at top right, rgba(245, 158, 11, 0.16), transparent 48%),
          linear-gradient(180deg, rgba(59, 130, 246, 0.12), rgba(255, 255, 255, 0.06));
        border-color: rgba(245, 158, 11, 0.34);
        box-shadow:
          inset 0 1px 0 rgba(255, 255, 255, 0.08),
          0 0 0 1px rgba(245, 158, 11, 0.08);
      }

      .stage-tile.dim {
        opacity: 0.45;
        filter: grayscale(0.45);
      }

      .stage-number {
        font-size: 1.2rem;
        font-weight: 800;
      }

      .stage-title {
        color: var(--muted);
        line-height: 1.4;
      }

      .stage-tile .small {
        font-size: 0.82rem;
        color: var(--soft);
      }

      .reward-strip {
        display: grid;
        gap: 12px;
      }

      .reward-card {
        border-radius: 22px;
        overflow: hidden;
        padding: 12px;
      }

      .reward-card img {
        width: 100%;
        height: 180px;
        object-fit: cover;
        border-radius: 16px;
        display: block;
        background: rgba(255, 255, 255, 0.04);
      }

      .reward-card figcaption {
        padding: 12px 4px 2px;
        color: var(--muted);
        font-size: 0.92rem;
      }

      .banner {
        padding: 16px 18px;
        border-radius: 20px;
        border: 1px solid rgba(245, 158, 11, 0.28);
        background: rgba(245, 158, 11, 0.1);
        color: #fff7ed;
      }

      .banner strong {
        display: block;
        margin-bottom: 6px;
      }

      .modal-backdrop {
        position: fixed;
        inset: 0;
        background: rgba(2, 6, 23, 0.72);
        display: grid;
        place-items: center;
        padding: 20px;
        z-index: 60;
      }

      .modal {
        width: min(960px, 100%);
        max-height: min(92vh, 980px);
        overflow: auto;
        border-radius: 28px;
        border: 1px solid var(--line);
        background: linear-gradient(180deg, rgba(15, 23, 42, 0.99), rgba(15, 23, 42, 0.96));
        box-shadow: var(--shadow);
      }

      .modal-inner {
        padding: 20px;
      }

      .modal-head {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
        margin-bottom: 16px;
      }

      .modal-head h3 {
        margin: 0;
      }

      .divider {
        height: 1px;
        margin: 16px 0;
        background: var(--line);
      }

      .toast {
        position: fixed;
        left: 50%;
        bottom: 24px;
        transform: translateX(-50%);
        min-width: min(680px, calc(100vw - 32px));
        padding: 14px 18px;
        border-radius: 18px;
        border: 1px solid rgba(34, 197, 94, 0.3);
        background: rgba(5, 46, 22, 0.92);
        color: #dcfce7;
        box-shadow: var(--shadow);
        z-index: 80;
      }

      .toast.with-picture,
      .unlock-banner {
        display: flex;
        align-items: center;
        gap: 14px;
      }

      .unlock-banner {
        justify-content: space-between;
        flex-wrap: wrap;
      }

      .unlock-copy {
        display: grid;
        gap: 4px;
      }

      .unlock-pictures {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
      }

      .unlock-pictures img {
        width: 68px;
        height: 52px;
        object-fit: cover;
        border-radius: 8px;
        border: 1px solid rgba(255, 255, 255, 0.18);
      }

      .records-list,
      .progress-list {
        display: grid;
        gap: 12px;
      }

      .person-row {
        display: grid;
        grid-template-columns: auto minmax(0, 1fr) auto;
        gap: 14px;
        align-items: center;
        padding: 14px;
        border-radius: 20px;
      }

      button.person-row {
        width: 100%;
        border: 1px solid var(--line);
        text-align: left;
        cursor: pointer;
      }

      button.person-row.active {
        outline: 3px solid rgba(56, 189, 248, 0.28);
      }

      .person-row strong {
        display: block;
      }

      .person-row .right {
        text-align: right;
        color: var(--soft);
        font-size: 0.88rem;
      }

      .empty-state {
        padding: 20px;
        border-radius: 22px;
        border: 1px dashed rgba(255, 255, 255, 0.14);
        color: var(--soft);
      }

      .subtle {
        color: var(--soft);
      }

      .tag {
        display: inline-flex;
        align-items: center;
        min-height: 28px;
        padding: 0 10px;
        border-radius: 999px;
        font-size: 0.8rem;
        border: 1px solid var(--line);
      }

      .tag.host {
        color: #bae6fd;
        border-color: rgba(56, 189, 248, 0.3);
        background: rgba(56, 189, 248, 0.08);
      }

      .tag.inside {
        color: #bbf7d0;
        border-color: rgba(34, 197, 94, 0.28);
        background: rgba(34, 197, 94, 0.08);
      }

      .tag.left {
        color: #fde68a;
        border-color: rgba(245, 158, 11, 0.3);
        background: rgba(245, 158, 11, 0.08);
      }

      .tag.off {
        color: #cbd5e1;
        border-color: rgba(148, 163, 184, 0.3);
        background: rgba(148, 163, 184, 0.07);
      }

      .tag.deleted {
        color: #fda4af;
        border-color: rgba(251, 113, 133, 0.3);
        background: rgba(251, 113, 133, 0.09);
      }

      body .topbar,
      body .frame,
      body .modal {
        background: #ffffff;
        border-color: var(--line);
        box-shadow: var(--shadow);
      }

      body .dropdown {
        background: #ffffff;
        border-color: var(--line);
      }

      body .choice-card,
      body .mini-card,
      body .reward-card,
      body .player-card,
      body .stage-card,
      body .stats-card,
      body .stage-tile,
      body .stage-start,
      body .person-row,
      body .detail-card,
      body .secondary,
      body .icon-btn,
      body .field input,
      body .chip,
      body .pill,
      body .menu-trigger {
        background: #f8fafc;
        border-color: var(--line);
        color: var(--text);
      }

      body .choice-card:hover,
      body .player-card:hover,
      body .stage-tile:hover,
      body .dropdown button:hover {
        background: #f1f5f9;
      }

      body .player-card.active,
      body .stage-tile.bright,
      body .banner {
        background: #fff7ed;
        color: #7c2d12;
        border-color: rgba(245, 158, 11, 0.32);
      }

      body .stage-tile.dim {
        opacity: 0.5;
      }

      body .empty-state {
        border-color: rgba(15, 23, 42, 0.18);
      }

      body .modal-backdrop {
        background: rgba(15, 23, 42, 0.35);
      }

      body .tag.host,
      body .chip.blue {
        color: #0369a1;
      }

      body .tag.inside,
      body .chip.green {
        color: #166534;
      }

      body .tag.left,
      body .chip.amber {
        color: #92400e;
      }

      body .tag.off {
        color: #475569;
      }

      body .tag.deleted,

      }

      }

        .hero-grid,
        .split {
          grid-template-columns: 1fr;
        }

        .choice-grid {

        }

        .stats-grid,

        .app {

        }

        .topbar {
          padding: 16px;
          align-items: flex-start;
        }

        .brand {
          align-items: flex-start;
        }

        .topbar-actions {
          flex-wrap: wrap;
          justify-content: flex-end;
        }

        .stage-grid,
        .stats-grid {
          grid-template-columns: 1fr;
        }

        .person-row {
          grid-template-columns: auto 1fr;
        }

        .person-row .right {
          grid-column: 1 / -1;
          text-align: left;
        }

        .mobile-only {
          display: inline-flex;
        }

        .toast {
          min-width: auto;
        }
      }

      .fade-in {
        animation: none;
      }

      @keyframes fadeIn {
        from {
          opacity: 0;
          transform: translateY(8px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
