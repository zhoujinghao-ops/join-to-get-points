        6: { title: "ufo", items: ["ufo"] },
        7: { title: "surfboard", items: ["surfboard"] },
        8: { title: "nothing", items: [] },
        9: { title: "nothing", items: [] },
        10: { title: "+1 bubble or +1 segway", items: ["bubble", "segway"] },
        11: { title: "creeper hot air balloon", items: ["creeperBalloon"] },
        12: { title: "nothing", items: [] },
        13: { title: "nothing", items: [] },
        14: { title: "sailboat", items: ["sailboat"] },
        15: { title: "forklift", items: ["forklift"] },
        16: { title: "helicopter", items: ["helicopter"] },
      };

      const STAGE_ORDER = Array.from({ length: 17 }, (_, i) => i);

      function dataUrl(svg) {
        return `data:image/svg+xml;charset=UTF-8,${encodeURIComponent(svg.replace(/\n\s+/g, " ").trim())}`;
      }

      function assetFor(key) {
        if (key === "blueprint") return BLUEPRINT;
        if (key === "specialPicture") return SPECIAL_PICTURE;
        return ASSETS[key];
      }

      function createId() {
        return Math.random().toString(36).slice(2, 10) + Date.now().toString(36);
      }

      function escapeHtml(value) {
        return String(value)
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;")
          .replaceAll('"', "&quot;")
          .replaceAll("'", "&#39;");
      }

      function stageFromPoints(points) {
        if (!points || points <= 0) return 0;
        if (points <= 4) return 1;
        return Math.min(16, Math.floor(points / 5) + 1);
      }

      function pointsForStage(stage) {
        if (stage <= 0) return 0;
        if (stage >= 16) return 75;
        if (stage === 1) return 1;
        return (stage - 1) * 5;
      }

      function stageRange(stage) {
        if (stage === 0) return "0";
        if (stage === 1) return "1-4";
        if (stage === 16) return "75-80";
        const start = (stage - 1) * 5;
        const end = stage * 5 - 1;
        return `${start}-${end}`;
      }

      function stageReward(stage) {
        return STAGE_REWARDS[stage] || { title: "nothing", items: [] };
      }

      function unlockMessage(person, stage) {
        const reward = stageReward(stage);
        return reward.title === "nothing"
          ? `Congratulations ${person.name}! You unlocked Stage ${stage}!`
          : `Congratulations ${person.name}! You unlocked Stage ${stage}: ${reward.title}`;
      }

      function hostUnlockMessage(person, stage) {
        return `${person.name} have unlocked Stage ${stage}`;
      }

      function accountExitMessage(person) {
        if (!person) return null;
        const personIsHost = person.role === "host" || isActiveHost(person);
        if (person.state === "deleted") return "Your account was deleted.";
        if (person.state === "logged_off") return personIsHost ? "host logged off" : `${person.name} logged off.`;
        if (person.state === "left") return personIsHost ? "host leaved" : `${person.name} left.`;
        return null;
      }

      function shouldShowPlayerUnlock(person, previousPerson) {
        if (!person || !isPlayerOnly(person) || person.lastUnlock == null) return false;
        state.seenUnlocks = state.seenUnlocks || {};
        const unlockKey = `${person.lastUnlock}:${person.lastUnlockAt || 0}`;
        if (state.seenUnlocks[person.id] === unlockKey) return false;
        return !previousPerson
          || previousPerson.lastUnlock !== person.lastUnlock
          || previousPerson.lastUnlockAt !== person.lastUnlockAt
          || state.seenUnlocks[person.id] !== unlockKey;
      }

      function pauseStatusMessage(person, previousPerson) {
        if (!person || !previousPerson || !isPlayerOnly(person)) return null;
        if (!previousPerson.paused && person.paused) return "You have been paused.";
        if (previousPerson.paused && !person.paused) return "You got resumed.";
        return null;
      }

      function markUnlockSeen(person) {
        if (!person || person.lastUnlock == null) return;
        state.seenUnlocks = state.seenUnlocks || {};
        state.seenUnlocks[person.id] = `${person.lastUnlock}:${person.lastUnlockAt || 0}`;
      }

      function renderUnlockPictures(stage) {
        const reward = stageReward(stage);
        if (!reward.items.length) return "";
        return `
          <div class="unlock-pictures">
            ${reward.items.map((item) => {
              const label = item === "monsterTruck" ? "monster truck" : item === "creeperBalloon" ? "creeper hot air balloon" : item === "specialPicture" ? "special picture" : item;
              return `<img src="${escapeHtml(assetFor(item))}" alt="${escapeHtml(label)}" />`;
            }).join("")}
          </div>
        `;
      }

      function renderUnlockBanner(person, stage, title = "Congratulations") {
        return `
          <div class="banner unlock-banner">
            <div class="unlock-copy">
              <strong>${escapeHtml(title)}</strong>
              <span>${escapeHtml(unlockMessage(person, stage))}</span>
            </div>
            ${renderUnlockPictures(stage)}
          </div>
        `;
      }

      function currentStage(person) {
        return stageFromPoints(person.points);
      }

      function defaultState() {
        return {
          screen: "welcome",
          tab: "home",
          currentUserId: null,
          hostId: null,
          hostLocked: false,
          people: [],
          selectedPlayerId: null,
          showMenu: false,
          showLogoffPrompt: false,
          directStageEditFor: null,
          directStageValue: "",
          stageFocus: null,
          seenUnlocks: {},
          toast: null,
        };
      }

      function loadState() {
        const saved = localStorage.getItem(STORAGE_KEY);
        if (!saved) {
          return defaultState();
        }

        try {
          const parsed = JSON.parse(saved);
          const nextState = {
            ...defaultState(),
            ...parsed,
            showMenu: false,
            showLogoffPrompt: false,
            toast: null,
          };
          cleanSavedPeople(nextState);
          return nextState;
        } catch (error) {
          console.warn("Could not parse saved state", error);
          localStorage.removeItem(STORAGE_KEY);
          return loadState();
        }
      }

      const state = loadState();
      const app = document.getElementById("app");
      let lastSharedStateSignature = JSON.stringify({
        hostId: state.hostId,
        hostLocked: state.hostLocked,
        people: state.people,
      });

      function cleanSavedPeople(savedState) {
        const validStates = new Set(["inside", "left", "logged_off", "deleted"]);
        savedState.people = Array.isArray(savedState.people) ? savedState.people : [];
        savedState.people.forEach((person) => {
          if (!validStates.has(person.state)) person.state = "inside";
          if (!person.role) person.role = savedState.hostId === person.id ? "host" : "player";
          if (typeof person.points !== "number") person.points = 0;
          if (typeof person.highestStage !== "number") person.highestStage = currentStage(person);
          if (person.lastUnlock === undefined) person.lastUnlock = null;
          if (person.lastUnlockAt === undefined) person.lastUnlockAt = null;
          if (person.lastDailyAuto === undefined) person.lastDailyAuto = null;
          if (person.lastDailyVisit === undefined) person.lastDailyVisit = null;
          if (typeof person.paused !== "boolean") person.paused = false;
        });
      }

      function sharedStateSignature(savedState) {
        return JSON.stringify({
          hostId: savedState.hostId,
          hostLocked: savedState.hostLocked,
          people: savedState.people,
        });
      }

      function sharedStatePayload() {
        return {
          hostId: state.hostId,
          hostLocked: state.hostLocked,
          people: state.people,
        };
      }

      function localStatePayload() {
        return {
          screen: state.screen,
          tab: state.tab,
          currentUserId: state.currentUserId,
          selectedPlayerId: state.selectedPlayerId,
          showMenu: state.showMenu,
          showLogoffPrompt: state.showLogoffPrompt,
          directStageEditFor: state.directStageEditFor,
          directStageValue: state.directStageValue,
          stageFocus: state.stageFocus,
          seenUnlocks: state.seenUnlocks || {},
          ...sharedStatePayload(),
        };
      }

      function saveLocalState() {
        localStorage.setItem(STORAGE_KEY, JSON.stringify({
          ...localStatePayload(),
        }));
      }

      function saveState() {
        const nextSharedStateSignature = sharedStateSignature(state);
        const sharedStateChanged = nextSharedStateSignature !== lastSharedStateSignature;
        if (sharedStateChanged) {
          lastSharedStateSignature = nextSharedStateSignature;
        }
        saveLocalState();
        if (!sharedStateChanged || !onlineWriteEnabled || applyingRemoteState) return;
        setDoc(sharedStateDoc, {
          ...sharedStatePayload(),
          updatedAt: serverTimestamp(),
        }, { merge: true }).catch((error) => {
          console.warn("Could not save online state", error);
          setToast("Online save is not ready yet. Check Firebase database setup.");
        });
      }

      function applySharedState(saved) {
        const previousCurrentUser = currentUser();
        const nextState = {
          ...defaultState(),
          ...saved,
          screen: state.screen,
          tab: state.tab,
          currentUserId: state.currentUserId,
          selectedPlayerId: state.selectedPlayerId,
          showMenu: state.showMenu,
          showLogoffPrompt: state.showLogoffPrompt,
          directStageEditFor: state.directStageEditFor,
          directStageValue: state.directStageValue,
          stageFocus: state.stageFocus,
          seenUnlocks: state.seenUnlocks || {},
          toast: state.toast,
        };
        cleanSavedPeople(nextState);
        const nextSignature = sharedStateSignature(nextState);
        if (nextSignature === lastSharedStateSignature) return;
        applyingRemoteState = true;
        lastSharedStateSignature = nextSignature;
        state.hostId = nextState.hostId;
        state.hostLocked = nextState.hostLocked;
        state.people = nextState.people;
        const signedInPerson = state.currentUserId
          ? state.people.find((person) => person.id === state.currentUserId)
          : null;
        if (state.currentUserId && (!signedInPerson || signedInPerson.state !== "inside")) {
          const exitMessage = accountExitMessage(signedInPerson);
          state.currentUserId = null;
          state.screen = "welcome";
          state.showMenu = false;
          state.showLogoffPrompt = false;
          state.toast = exitMessage || state.toast;
        }
        if (state.selectedPlayerId && !state.people.some((person) => person.id === state.selectedPlayerId)) {
          state.selectedPlayerId = null;
        }
        const nextCurrentUser = currentUser();
        const playerUnlockedNewStage = shouldShowPlayerUnlock(nextCurrentUser, previousCurrentUser);
        const playerPauseMessage = pauseStatusMessage(nextCurrentUser, previousCurrentUser);
        saveLocalState();
        applyingRemoteState = false;
        if (playerPauseMessage) {
          setToast(playerPauseMessage);
        } else if (playerUnlockedNewStage) {
          markUnlockSeen(nextCurrentUser);
          saveLocalState();
          setToast({ message: unlockMessage(nextCurrentUser, nextCurrentUser.lastUnlock), stage: nextCurrentUser.lastUnlock });
        } else {
          render();
        }
      }

      async function startFirebaseSync() {
        try {
          const remoteSnapshot = await getDoc(sharedStateDoc);
          if (remoteSnapshot.exists()) {
            applySharedState(remoteSnapshot.data());
          } else if (state.people.length || state.hostId || state.hostLocked) {
            await setDoc(sharedStateDoc, {
              ...sharedStatePayload(),
              updatedAt: serverTimestamp(),
            }, { merge: true });
          }

          onlineWriteEnabled = true;
          onSnapshot(sharedStateDoc, (snapshot) => {
            if (snapshot.exists()) {
              applySharedState(snapshot.data());
            }
          }, (error) => {
            console.warn("Could not read online state", error);
            setToast("Online database is not ready yet.");
          });
        } catch (error) {
          console.warn("Firebase sync failed", error);
          setToast("Online database is not ready yet.");
        }
      }

      function syncSharedStateFromStorage() {
        const previousCurrentUser = currentUser();
        const saved = loadState();
        const nextSignature = sharedStateSignature(saved);
        if (nextSignature === lastSharedStateSignature) return;
        lastSharedStateSignature = nextSignature;
        state.hostId = saved.hostId;
        state.hostLocked = saved.hostLocked;
        state.people = saved.people;
        const signedInPerson = state.currentUserId
          ? state.people.find((person) => person.id === state.currentUserId)
          : null;
        if (state.currentUserId && (!signedInPerson || signedInPerson.state !== "inside")) {
          const exitMessage = accountExitMessage(signedInPerson);
          state.currentUserId = null;
          state.screen = "welcome";
          state.showMenu = false;
          state.showLogoffPrompt = false;
          state.toast = exitMessage || state.toast;
        }
        if (state.selectedPlayerId && !state.people.some((person) => person.id === state.selectedPlayerId)) {
          state.selectedPlayerId = null;
        }
        const nextCurrentUser = currentUser();
        const playerUnlockedNewStage = shouldShowPlayerUnlock(nextCurrentUser, previousCurrentUser);
        const playerPauseMessage = pauseStatusMessage(nextCurrentUser, previousCurrentUser);
        if (playerPauseMessage) {
          saveLocalState();
          setToast(playerPauseMessage);
        } else if (playerUnlockedNewStage) {
          markUnlockSeen(nextCurrentUser);
          saveLocalState();
          setToast({ message: unlockMessage(nextCurrentUser, nextCurrentUser.lastUnlock), stage: nextCurrentUser.lastUnlock });
        } else {
          render();
        }
      }

      function setToast(message) {
        state.toast = typeof message === "string" ? { message, stage: null } : message;
        render();
        window.clearTimeout(setToast._timer);
        setToast._timer = window.setTimeout(() => {
          state.toast = null;
          render();
        }, 2600);
      }

      function hostAccountExists() {
        return state.people.some((person) => person.name === HOST_NAME);
      }

      function currentUser() {
        return state.people.find((person) => person.id === state.currentUserId) || null;
      }

      function hostPerson() {
        return state.people.find((person) => person.id === state.hostId) || null;
      }

      function currentHostIsActive() {
        return Boolean(state.hostId && state.people.some((person) => person.id === state.hostId));
      }

      function isCurrentHost(person) {
        return Boolean(person && state.hostId === person.id);
      }

      function isActiveHost(person) {
        return Boolean(person && person.role === "host" && state.hostId === person.id);
      }

      function isPlayerOnly(person) {
        return !isActiveHost(person);
      }

      function isHostEligible() {
        return !state.hostLocked && !currentHostIsActive();
      }

      function claimHost(person) {
        state.hostId = person.id;
        person.role = "host";
        person.state = "inside";
        state.hostLocked = false;
      }

      function addPerson({ name, password, role, stateName }) {
        const person = {
          id: createId(),
          name,
          password,
          role,
          state: stateName,
          points: 0,
          highestStage: 0,
          lastUnlock: null,
          lastUnlockAt: null,
          lastDailyAuto: null,
          lastDailyVisit: null,
          paused: false,
          createdAt: Date.now(),
        };
        state.people.push(person);
        return person;
      }

      function findPersonByCredentials(name, password) {
        const matches = state.people.filter(
          (person) => person.name === name && person.password === password
        );
        return [...matches].reverse().find((person) => person.state !== "deleted") || matches.at(-1) || null;
      }

      function findPersonByName(name) {
        return state.people.find((person) => person.name === name) || null;
      }

      function nameIsInUse(name) {
        return state.people.some((person) => person.name === name && (person.state === "inside" || person.state === "left"));
      }

      function loginPerson(person) {
        giveDailyAutoPoints();
        giveDailyVisitPoint(person);
        state.currentUserId = person.id;
        state.screen = "dashboard";
        state.showMenu = false;
        state.showLogoffPrompt = false;
        state.directStageEditFor = null;
        state.directStageValue = "";
        if (person.role === "host" && state.hostId === person.id) {
          state.tab = "home";
        } else {
          state.tab = "home";
        }
        saveState();
        render();
      }

      function todayKey() {
        return new Date().toLocaleDateString("en-CA");
      }

      function dateKeyToTime(key) {
        const date = new Date(`${key}T00:00:00Z`);
        return Number.isNaN(date.getTime()) ? null : date.getTime();
      }

      function missedDailyCount(lastDailyKey, today) {
        if (!lastDailyKey) return 1;
        const lastTime = dateKeyToTime(lastDailyKey);
        const todayTime = dateKeyToTime(today);
        if (lastTime == null || todayTime == null) return lastDailyKey === today ? 0 : 1;
        return Math.max(0, Math.floor((todayTime - lastTime) / 86400000));
      }

      function recordStageUnlock(person, nextStage) {
        person.highestStage = Math.max(person.highestStage, nextStage);
        person.lastUnlock = nextStage;
        person.lastUnlockAt = Date.now();
      }

      function giveDailyAutoPoints() {
        const today = todayKey();
        state.people.forEach((person) => {
          if (!isPlayerOnly(person) || person.state === "logged_off" || person.state === "deleted") return;
          if (person.paused) {
            person.lastDailyAuto = today;
            return;
          }

          const pointsToAdd = missedDailyCount(person.lastDailyAuto, today);
          if (pointsToAdd <= 0) return;

          const previousStage = currentStage(person);
          person.lastDailyAuto = today;
          person.points = Math.max(0, person.points + pointsToAdd);
          const nextStage = currentStage(person);

          if (nextStage > previousStage) {
            recordStageUnlock(person, nextStage);
          }
        });
      }

      function giveDailyVisitPoint(person) {
        if (!person || person.role === "host") return;
        if (person.paused) {
          setToast(`${person.name} is paused and got no daily points.`);
          return;
        }
        const today = todayKey();
        if (person.lastDailyVisit === today) return;

        const previousStage = currentStage(person);
        person.lastDailyVisit = today;
        person.points = Math.max(0, person.points + 1);
        const nextStage = currentStage(person);

        if (nextStage > previousStage) {
          recordStageUnlock(person, nextStage);
          setToast(hostUnlockMessage(person, nextStage));
        } else {
          setToast(`${person.name} got +1 visit point.`);
        }
      }

      function showLoginScreen() {
        state.screen = "welcome";
        state.currentUserId = null;
        state.showMenu = false;
        state.showLogoffPrompt = false;
        state.directStageEditFor = null;
        state.directStageValue = "";
        saveState();
        render();
      }

      function setScreen(screen) {
        state.screen = screen;
        state.showMenu = false;
        state.showLogoffPrompt = false;
        state.directStageEditFor = null;
        state.directStageValue = "";
        saveState();
        render();
      }

      function normalizeName(value) {
        return String(value || "").trim();
      }

      function registerFirstTime(form) {
        const name = normalizeName(form.name.value);
        const password = String(form.password.value || "").trim();

        if (!name || !password) {
          setToast("Set name and set password first.");
          return;
        }

        if (nameIsInUse(name)) {
          setToast("That name already exists.");
          return;
        }

        const canBecomeHost = name === HOST_NAME && password === HOST_PASSWORD && isHostEligible();
        const person = addPerson({
          name,
          password,
          role: canBecomeHost ? "host" : "player",
          stateName: "inside",
        });

        if (canBecomeHost) {
          claimHost(person);
          setToast("Host created. You are the only host.");
        } else if (name === HOST_NAME && password === HOST_PASSWORD && !isHostEligible()) {
          setToast("That host pair is locked right now, so it cannot create a new host.");
        } else {
          setToast("Account created.");
        }

        loginPerson(person);
      }

      function signInReturning(form) {
        const name = normalizeName(form.name.value);
        const password = String(form.password.value || "").trim();

        if (!name || !password) {
          setToast("Enter name and password.");
          return;
        }

        const person = findPersonByCredentials(name, password);
        if (!person) {
          setToast("No matching account yet. Try first time sign up.");
          return;
        }

        if (person.state === "deleted") {
          setToast("That account has been deleted.");
          return;
        }

        if (name === HOST_NAME && password === HOST_PASSWORD) {
          if (!currentHostIsActive() && !state.hostLocked) {
            state.hostId = person.id;
            person.role = "host";
            person.state = "inside";
            setToast("You are now the host.");
          } else if (state.hostId === person.id) {
            person.role = "host";
            person.state = person.state === "logged_off" || person.state === "left" ? "inside" : person.state;
          } else if (state.hostLocked) {
            setToast("The host spot is locked because the host left.");
          }
        }

        if (person.state === "logged_off" || person.state === "left") {
          person.state = "inside";
          setToast("Welcome back.");
        }

        loginPerson(person);
      }

      function stageAdvance(person, nextStage) {
        const clamped = Math.max(0, Math.min(16, nextStage));
        const previousStage = currentStage(person);
        person.points = pointsForStage(clamped);
        person.state = person.state === "logged_off" ? "inside" : person.state;

        if (clamped > previousStage) {
          recordStageUnlock(person, clamped);
          setToast(hostUnlockMessage(person, clamped));
        }

        persistAndRender();
      }

      function togglePause(person) {
        person.paused = !person.paused;
        person.lastDailyAuto = todayKey();
        setToast(person.paused ? `${person.name} is paused.` : `${person.name} can get daily points again.`);
        persistAndRender();
      }

      function awardPoints(person, delta) {
        const previousStage = currentStage(person);
        const parsed = Number(delta);
        if (!Number.isFinite(parsed)) {
          setToast("Type a number for the award.");
          return;
        }

        if (parsed === 0) {
          return;
        }

        person.points = Math.max(0, person.points + parsed);
        const nextStage = currentStage(person);
        if (nextStage > previousStage) {
          recordStageUnlock(person, nextStage);
          setToast(hostUnlockMessage(person, nextStage));
        } else if (nextStage !== previousStage) {
          setToast(`${person.name} is now Stage ${nextStage}.`);
        } else {
          setToast(`${person.name} got ${parsed >= 0 ? "+" : ""}${parsed} points.`);
        }

        persistAndRender();
      }

      function deletePerson(personId) {
        const person = state.people.find((entry) => entry.id === personId);
        if (!person) return;

        person.state = "deleted";
        if (state.currentUserId === person.id) {
          state.currentUserId = null;
        }
        if (state.hostId === person.id) {
          state.hostId = null;
          state.hostLocked = false;
        }
        state.selectedPlayerId = null;
        state.showLogoffPrompt = false;
        setToast(`${person.name} has been deleted.`);
        persistAndRender();
      }

      function restorePerson(personId) {
        const person = state.people.find((entry) => entry.id === personId);
        if (!person) return;

        person.state = "inside";
        state.selectedPlayerId = person.id;
        state.tab = "home";
        state.showLogoffPrompt = false;
        setToast(`${person.name} was added back.`);
        persistAndRender();
      }

      function markLeft(person) {
        const isLeavingHost = state.hostId === person.id;
        person.state = "left";
        state.showLogoffPrompt = false;
        state.showMenu = false;
        if (state.currentUserId === person.id) {
          state.currentUserId = null;
        }
        state.screen = "welcome";
        if (isLeavingHost) {
          state.hostLocked = true;
          setToast("host leaved");
        } else {
          setToast(`${person.name} left.`);
        }
        persistAndRender();
      }

      function togglePlayerInside(person) {
        const isComingInside = person.state === "left";
        person.state = isComingInside ? "inside" : "left";
        state.selectedPlayerId = null;
        state.showLogoffPrompt = false;
        state.showMenu = false;
        setToast(isComingInside ? `${person.name} is inside.` : `${person.name} left.`);
        persistAndRender();
      }

      function markLoggedOff(person) {
        const isLoggingOffHost = state.hostId === person.id;
        person.state = "logged_off";
        state.showLogoffPrompt = false;
        state.showMenu = false;
        if (isLoggingOffHost) {
          state.hostId = null;
          state.hostLocked = false;
        }
        if (state.currentUserId === person.id) {
          state.currentUserId = null;
        }
        setToast(isLoggingOffHost ? "host logged off" : `${person.name} logged off.`);
        state.screen = "welcome";
        persistAndRender();
      }

      function resetWebsite() {
        localStorage.removeItem(STORAGE_KEY);
        state.screen = "welcome";
        state.tab = "home";
        state.currentUserId = null;
        state.hostId = null;
        state.hostLocked = false;
        state.people = [];
        state.selectedPlayerId = null;
        state.showMenu = false;
        state.showLogoffPrompt = false;
        state.directStageEditFor = null;
        state.directStageValue = "";
        state.stageFocus = null;
        state.toast = "Website reset.";
        saveState();
        render();
      }

      function persistAndRender() {
        saveState();
        render();
      }

      function avatarText(person) {
        return person.role === "host" && isCurrentHost(person) ? "HT" : person.name.slice(0, 2).toUpperCase();
      }

      function visibleStageTitle(stage) {
        if (stage === 0) return "Start";
        const reward = stageReward(stage);
        return reward.title;
      }

      function playersOnStage(stage) {
        return state.people
          .filter((person) => isPlayerOnly(person) && person.state !== "logged_off" && person.state !== "deleted" && currentStage(person) === stage)
          .map((person) => person.name);
      }

      function stageTileNote(stage, isHost, brightClass) {
        if (!isHost) return brightClass === "bright" ? "bright" : "dark";
        const names = playersOnStage(stage);
        return names.length ? names.join(", ") : "No players";
      }

      function toastMessage() {
        return typeof state.toast === "string" ? state.toast : state.toast?.message;
      }

      function toastStage() {
        return typeof state.toast === "object" && state.toast ? state.toast.stage : null;
      }

      function render() {
        if (render._queued) return;
        render._queued = true;
        window.requestAnimationFrame(() => {
          render._queued = false;
          const user = currentUser();
          const isHost = Boolean(user && user.role === "host" && state.hostId === user.id);
          const canAddPoints = Boolean(isHost);
          const userLabel = isHost ? "host" : `${user?.name || ""} · player`;
          const topbarRight = user
            ? `
              <div class="topbar-actions">
                <a class="birthday-link" href="birthday.html?from=points">Birthday</a>
                <span class="pill">${escapeHtml(userLabel)}</span>
                <button class="menu-trigger" data-action="toggle-menu" aria-label="Open menu">...</button>
              </div>
            `
            : `<div class="topbar-actions"><a class="birthday-link" href="birthday.html?from=points">Birthday</a><span class="pill">Welcome desk</span></div>`;

          let content = "";

          if (state.screen === "welcome") {
            content = renderWelcome();
          } else if (state.screen === "signup") {
            content = renderSignup();
          } else if (state.screen === "login") {
            content = renderLogin();
          } else {
            content = renderDashboard(isHost, user, canAddPoints);
          }

          app.innerHTML = `
            <header class="topbar">
              <div class="brand">
                <div class="brand-mark">◎</div>
                <div>
                  <h1>Join to Get Points</h1>
                  <p>One host. One player view. One square of stages.</p>
                </div>
              </div>
              ${topbarRight}
            </header>
            ${state.showMenu && user ? renderMenu(isHost) : ""}
            ${content}
            <div class="credit">made by jinghao</div>
            ${state.toast ? `<div class="toast ${toastStage() != null && stageReward(toastStage()).items.length ? "with-picture" : ""}">
              <span>${escapeHtml(toastMessage())}</span>
              ${toastStage() != null ? renderUnlockPictures(toastStage()) : ""}
            </div>` : ""}
            ${state.showLogoffPrompt && user ? renderLogoffPrompt(user, isHost) : ""}
          `;
        });
      }

      function renderWelcome() {
        return `
          <section class="frame hero fade-in">
            <div class="hero-grid">
              <div class="hero-copy">
                <h2>First time in, or coming back?</h2>
                <p>
                  Everyone starts with the same two fields. Players get their own private home page,
                  and the progress page shows everyone.
                </p>
                <div class="button-row">
                  <button class="cta" data-action="goto-signup">This is my first time</button>
                  <button class="secondary cta" data-action="goto-login">I am here before</button>
                </div>
                <div class="choice-grid">
                  <div class="choice-card">
                    <div class="choice-title"><span>First time</span><span>→</span></div>
                    <p>Set name and set password to create a new account.</p>
                    <div class="choice-footer"><span class="chip amber">New account</span><span class="subtle">Signup</span></div>
                  </div>
                  <div class="choice-card">
                    <div class="choice-title"><span>Returning</span><span>→</span></div>
                    <p>Enter the same name and password you used before to get back into your account.</p>
                    <div class="choice-footer"><span class="chip blue">Existing account</span><span class="subtle">Login</span></div>
                  </div>
                </div>
              </div>
              <div class="stack">
                <div class="mini-card panel">
                  <div class="section-title">
                    <h3>What happens after login</h3>
                    <small>Quick map</small>
                  </div>
                  <div class="stack">
                    <div class="banner"><strong>Player homepage</strong> the player only sees themselves.</div>
                    <div class="banner"><strong>Progress page</strong> the player can see all players.</div>
                    <div class="banner"><strong>Stage page</strong> the player sees a square grid of stages.</div>
                    <div class="banner"><strong>Host homepage</strong> the host sees everybody and gets the controls.</div>
                  </div>
                </div>
              </div>
            </div>
          </section>
        `;
      }

      function renderSignup() {
        return `
          <section class="frame hero fade-in">
            <div class="hero-grid">
              <div class="hero-copy">
                <h2>Set name, set password.</h2>
                <p>
                  Create your account with a name and password. If the name is already being used by someone inside or left, choose another one.
                </p>
                <form class="panel form-grid" data-form="signup">
                  <div class="field">
                    <label for="signup-name">Set name</label>
                    <input id="signup-name" name="name" autocomplete="username" placeholder="Type a name" />
                  </div>
                  <div class="field">
                    <label for="signup-password">Set password</label>
                    <input id="signup-password" name="password" type="password" autocomplete="new-password" placeholder="Type a password" />
                  </div>
                  <div class="button-row">
                    <button class="cta" type="submit">Create account</button>
                    <button class="secondary cta" type="button" data-action="back">Back</button>
                  </div>
                </form>
              </div>
              <div class="stack">
                <div class="detail-card">
                  <div class="detail-head">
                    <div>
                      <h3>Rules in this flow</h3>
                      <p>The first-time page only asks for set name and set password. Each active name must be different.</p>
                    </div>
                  </div>
                  <div class="button-row">
                    <span class="chip amber">New account</span>
                    <span class="chip blue">Unique active names</span>
                    <span class="chip green">Names stay unique</span>
                  </div>
                </div>
              </div>
            </div>
          </section>
        `;
      }

      function renderLogin() {
        return `
          <section class="frame hero fade-in">
            <div class="hero-grid">
              <div class="hero-copy">
                <h2>I am here before.</h2>
                <p>Use the same name and password you used before to get back into your account.</p>
                <form class="panel form-grid" data-form="login">
                  <div class="field">
                    <label for="login-name">Name</label>
                    <input id="login-name" name="name" autocomplete="username" placeholder="Your name" />
                  </div>
                  <div class="field">
                    <label for="login-password">Password</label>
                    <input id="login-password" name="password" type="password" autocomplete="current-password" placeholder="Your password" />
                  </div>
                  <div class="button-row">
                    <button class="cta" type="submit">Log in</button>
                    <button class="secondary cta" type="button" data-action="back">Back</button>
                  </div>
                </form>
              </div>
              <div class="stack">
                <div class="detail-card">
                  <div class="detail-head">
                    <div>
                      <h3>What opens after login</h3>
                      <p>The dashboard adapts to the person who signed in: player home, progress, stage grid, and host controls for the one host.</p>
                    </div>
                  </div>
                  <div class="button-row">
                    <span class="chip blue">Player home</span>
                    <span class="chip green">Progress page</span>
                    <span class="chip amber">Host home</span>
                    <span class="chip rose">Records page for host only</span>
                  </div>
                </div>
              </div>
            </div>
          </section>
        `;
      }

      function renderDashboard(isHost, user, canAddPoints) {
        if (!user) {
          return `
            <section class="frame hero fade-in">
              <div class="hero-copy">
                <h2>No one is signed in.</h2>
                <p>Jump back to the welcome screen and choose whether you are here before or this is your first time.</p>
                <div class="button-row">
                  <button class="cta" data-action="goto-welcome">Back to welcome</button>
                </div>
              </div>
            </section>
          `;
        }

        const home = renderHome(isHost, user, canAddPoints);
        const progress = renderProgress(user);
        const stage = renderStagePage(user);
        const records = isHost ? renderRecords() : "";

        const tabContent = state.tab === "home" ? home : state.tab === "progress" ? progress : state.tab === "stage" ? stage : records;

        return `
          <section class="fade-in">
            <div class="frame panel" style="margin-bottom: 18px;">
              <div class="section-title">
                <div>
                  <h3>${escapeHtml(isHost ? "Host dashboard" : "Player dashboard")}</h3>
                  <small>
                    ${escapeHtml(isHost ? "Host can add points and manage everybody." : "Player sees only their own home, plus progress and stages.")}
                  </small>
                </div>
                <div class="button-row">
                  <button class="ghost cta" data-action="set-tab" data-tab="home">Home</button>
                  <button class="ghost cta" data-action="set-tab" data-tab="progress">Progress</button>
                  <button class="ghost cta" data-action="set-tab" data-tab="stage">Stage</button>
                  ${isHost ? `<button class="ghost cta" data-action="set-tab" data-tab="records">Records</button>` : ""}
                </div>
              </div>
            </div>
            ${tabContent}
          </section>
        `;
      }

      function renderHome(isHost, user, canAddPoints) {
        const me = user;
        const inside = state.people.filter((person) => person.state === "inside" && isPlayerOnly(person));
        const left = state.people.filter((person) => person.state === "left" && isPlayerOnly(person));
        const visibleCards = isHost ? state.people.filter((person) => person.state !== "logged_off" && person.state !== "deleted" && isPlayerOnly(person)) : [me];

        const selected = isHost && state.selectedPlayerId ? state.people.find((person) => person.id === state.selectedPlayerId) : null;
        const selectedIsVisible = isHost && selected && visibleCards.some((person) => person.id === selected.id);

        return `
          <div class="split">
            <div class="stack">
              ${isHost ? renderPlayerGroup("Inside players", inside, "inside", selectedIsVisible, true) : renderPlayerGroup("Your page", [me], "inside", false, false)}
              ${isHost ? renderPlayerGroup("Left players", left, "left", selectedIsVisible, true) : ""}
            </div>
            <aside class="detail-card">
              ${isHost && selected && selectedIsVisible ? renderPlayerInspector(selected, isHost, canAddPoints) : isHost ? renderSelectedPrompt(isHost) : renderPlayerSelfPanel(me)}
            </aside>
          </div>
        `;
      }

      function renderPlayerGroup(title, people, mode, selectedIsVisible, canSelect) {
        const list = people.length
          ? people
              .map((person) => {
                const active = state.selectedPlayerId === person.id;
                const stage = currentStage(person);
                const hostBadge = person.role === "host" && state.hostId === person.id ? `<span class="tag host">host</span>` : "";
                const pausedBadge = person.paused ? `<span class="tag paused">paused</span>` : "";
                const cardAttrs = canSelect ? `button class="player-card ${active ? "active" : ""}" data-action="select-player" data-player-id="${person.id}"` : `div class="player-card"`;
                const cardClose = canSelect ? "button" : "div";
                return `
                  <${cardAttrs}>
                    <div class="player-top">
                      <div class="avatar ${person.role === "host" && state.hostId === person.id ? "host" : ""}">${escapeHtml(avatarText(person))}</div>
                      <div>
                        <h4>${escapeHtml(person.name)}</h4>
                        <div class="meta">${escapeHtml(person.points)} points · Stage ${escapeHtml(stage)}${person.paused ? " · paused" : ""}</div>
                      </div>
                    </div>
                    <div class="chip-row">
                      <span class="tag ${mode === "inside" ? "inside" : "left"}">${escapeHtml(person.state)}</span>
                      ${hostBadge}
                      ${pausedBadge}
                    </div>
                  </${cardClose}>
                `;
              })
              .join("")
          : `<div class="empty-state">No ${escapeHtml(title.toLowerCase())} right now.</div>`;

        return `
          <section class="frame panel">
            <div class="section-title">
              <h3>${escapeHtml(title)}</h3>
              <small>${escapeHtml(mode === "inside" ? "shown on the host home" : "shown lower down on the host home")}</small>
            </div>
            <div class="grid-players">${list}</div>
          </section>
        `;
      }

      function renderSelectedPrompt(isHost) {
        return `
          <div class="detail-head">
            <div>
              <h3>${escapeHtml(isHost ? "Pick a player" : "Your home")}</h3>
              <p>${escapeHtml(isHost ? "Click a player card to open award, delete, and stage controls." : "This home only shows you. Use the progress page or stage page to look around.")}</p>
            </div>
          </div>
          <div class="empty-state">
            ${escapeHtml(isHost ? "No player selected yet." : "Only your account is visible here.")}
          </div>
        `;
      }

      function renderPlayerSelfPanel(person) {
        const stage = currentStage(person);
        const reward = stageReward(stage);
        const stageInfo = stage === 0 ? "Start" : `Stage ${stage} · ${stageRange(stage)} points`;

        return `
          <div class="detail-head">
            <div>
              <h3>${escapeHtml(person.name)}</h3>
              <p>${escapeHtml(person.points)} points · ${escapeHtml(stageInfo)}</p>
            </div>
          </div>
          <div class="button-row">
            <span class="tag ${person.state === "inside" ? "inside" : person.state === "left" ? "left" : person.state === "logged_off" ? "off" : "deleted"}">${escapeHtml(person.state)}</span>
            ${person.paused ? `<span class="tag paused">paused</span>` : ""}
            <span class="tag">player</span>
          </div>
          <div class="divider"></div>
          <div class="reward-strip">
            <div class="stats-grid">
              <div class="stats-card">
                <small>Current stage</small>
                <strong>${escapeHtml(stage)} / 16</strong>
              </div>
              <div class="stats-card">
                <small>Reward</small>
                <strong>${escapeHtml(reward.title)}</strong>
              </div>
            </div>
          </div>
        `;
      }

      function renderProgress(user) {
        const people = state.people.filter((person) => {
          const visibleState = person.state === "inside" || person.state === "left";
          return visibleState && isPlayerOnly(person);
        });
        const rows = people.length
          ? people
              .map((person) => {
                const stage = currentStage(person);
                return `
                  <div class="person-row">
                    <div class="avatar ${person.role === "host" && state.hostId === person.id ? "host" : ""}">${escapeHtml(avatarText(person))}</div>
                    <div>
                      <strong>${escapeHtml(person.name)}</strong>
                      <div class="meta">${escapeHtml(person.points)} points · Stage ${escapeHtml(stage)} · ${escapeHtml(person.state)}${person.paused ? " · paused" : ""}</div>
                    </div>
                    <div class="right">
                      <span class="tag ${person.state === "inside" ? "inside" : "left"}">${escapeHtml(person.state)}</span>
                    </div>
                  </div>
                `;
              })
              .join("")
          : `<div class="empty-state">Nobody to show yet.</div>`;

        return `
          <section class="frame panel">
            <div class="section-title">
              <h3>Progress page</h3>
              <small>Players except logged off and deleted</small>
            </div>
            <div class="progress-list">${rows}</div>
          </section>
        `;
      }

      function renderRecords() {
        const people = state.people.filter((person) => isPlayerOnly(person) && (person.state === "logged_off" || person.state === "deleted"));
        const selected = state.selectedPlayerId ? people.find((person) => person.id === state.selectedPlayerId) : null;
        if (!people.length) {
          return `
            <section class="frame panel">
              <div class="section-title">
                <h3>Records</h3>
                <small>deleted and logged off players</small>
              </div>
              <div class="empty-state">No records yet.</div>
            </section>
          `;
        }

        const rows = people
          .map((person) => {
            const stage = currentStage(person);
            const tagClass = person.state === "inside" ? "inside" : person.state === "left" ? "left" : person.state === "logged_off" ? "off" : "deleted";
            const active = state.selectedPlayerId === person.id;
            return `
              <button class="person-row ${active ? "active" : ""}" data-action="select-player" data-player-id="${person.id}">
                <div class="avatar ${person.role === "host" && state.hostId === person.id ? "host" : ""}">${escapeHtml(avatarText(person))}</div>
                <div>
                  <strong>${escapeHtml(person.name)}</strong>
                  <div class="meta">${escapeHtml(person.points)} points · Stage ${escapeHtml(stage)}</div>
                </div>
                <div class="right">
                  <span class="tag ${tagClass}">${escapeHtml(person.state)}</span>
                </div>
              </button>
            `;
          })
          .join("");

        return `
          <div class="split">
            <section class="frame panel">
              <div class="section-title">
                <h3>Records page</h3>
                <small>deleted and logged off players</small>
              </div>
              <div class="records-list">${rows}</div>
            </section>
            <div class="detail-card">
              ${selected ? renderPlayerInspector(selected, true, true) : `
                <div class="detail-head">
                  <div>
                    <h3>Pick a record</h3>
                    <p>Click a logged off or deleted player to add them back.</p>
                  </div>
                </div>
                <div class="empty-state">No record selected yet.</div>
              `}
            </div>
          </div>
        `;
      }

      function renderStagePage(user) {
        const signedInHost = isActiveHost(user);
        const activeStage = signedInHost ? 16 : currentStage(user);
        const detailStage = state.stageFocus ?? activeStage;
        const reward = stageReward(detailStage);
        const itemCards = reward.items.length
          ? reward.items
              .map((item) => {
                const src = assetFor(item);
                const label = item === "monsterTruck" ? "monster truck" : item === "creeperBalloon" ? "creeper hot air balloon" : item === "specialPicture" ? "special picture" : item;
                return `
                  <figure class="reward-card">
                    <img src="${escapeHtml(src)}" alt="${escapeHtml(label)}" onerror="this.style.display='none'; this.nextElementSibling.style.display='block';" />
                    <figcaption style="display:none">${escapeHtml(label)}</figcaption>
                  </figure>
                `;
              })
              .join("")
          : `<div class="empty-state">Nothing unlocks here.</div>`;

        const stageTiles = STAGE_ORDER.slice(1).map((stage) => {
          const bright = stage <= activeStage;
          const brightClass = bright ? "bright" : "dim";
          const rewardLabel = visibleStageTitle(stage);
          return `
            <button class="stage-tile ${brightClass}" data-action="stage-detail" data-stage="${stage}">
              <div class="stage-number">Stage ${stage}</div>
              <div class="stage-title">${escapeHtml(rewardLabel)}</div>
              <div class="small">${escapeHtml(stageTileNote(stage, signedInHost, brightClass))}</div>
            </button>
          `;
        }).join("");

        const stage0Bright = "bright";

        return `
          <section class="frame panel">
            <div class="section-title">
              <h3>${escapeHtml(signedInHost ? "Host stage page" : "Player stage page")}</h3>
              <small>${escapeHtml(signedInHost ? "each stage shows who is there" : "square grid, bright up to current stage")}</small>
            </div>
            <div class="split">
              <div class="stage-rail">
                <button class="stage-start stage-tile ${stage0Bright}" data-action="stage-detail" data-stage="0">
                  <div class="stage-number">Stage 0</div>
                  <div class="stage-title">${escapeHtml(stageReward(0).title)}</div>
                  <div class="small">${escapeHtml(stageTileNote(0, signedInHost, stage0Bright))}</div>
                </button>
                <div class="stage-grid">
                  ${stageTiles}
                </div>
              </div>
              <div class="detail-card">
                <div class="detail-head">
                  <div>
                    <h3>Stage ${escapeHtml(detailStage)}</h3>
                    <p>${escapeHtml(reward.title === "nothing" ? "Nothing unlocks here." : `This stage unlocks ${reward.title}. Click the tile to change the preview.`)}</p>
                  </div>
                </div>
                <div class="reward-strip">
                  ${itemCards}
                </div>
              </div>
            </div>
          </section>
        `;
      }

      function renderMenu(isHost) {
        const menuItems = isHost
          ? `
            <button type="button" data-action="prompt-logoff">Log off</button>
            <button type="button" data-action="reset-website">Reset website</button>
            <button type="button" data-action="close-menu">Cancel</button>
          `
          : `
            <button type="button" data-action="prompt-logoff">Log off</button>
            <button type="button" data-action="close-menu">Cancel</button>
          `;

        return `
          <div class="dropdown fade-in">
            ${menuItems}
          </div>
        `;
      }

      function renderLogoffPrompt(user, isHost) {
        return `
          <div class="modal-backdrop">
            <div class="modal">
              <div class="modal-inner">
                <div class="modal-head">
                  <h3>Leave or log off</h3>
                  <button class="icon-btn" data-action="close-logoff" aria-label="Close logoff chooser">×</button>
                </div>
                <div class="detail-card">
                  <div class="button-row">
                    <button class="cta" data-action="do-leave">Leave</button>
                    <button class="secondary cta" data-action="do-logoff">Log off</button>
                  </div>
                  <p class="hint" style="margin-top: 12px;">
                    ${escapeHtml(isHost ? "Leave keeps the host spot locked. Log off opens the host spot again." : "Leave keeps your player account active for daily points. Log off stops daily points until you come back.")}
                  </p>
                </div>
              </div>
            </div>
          </div>
        `;
      }

      app.addEventListener("submit", (event) => {
        const form = event.target;
        if (form.matches('[data-form="signup"]')) {
          event.preventDefault();
          registerFirstTime(form);
        }

        if (form.matches('[data-form="login"]')) {
          event.preventDefault();
          signInReturning(form);
        }

        if (form.matches('[data-form="award"]')) {
          event.preventDefault();
        }

        if (form.matches('[data-form="stage-edit"]')) {
          event.preventDefault();
        }
      });

      app.addEventListener("dblclick", (event) => {
        const button = event.target.closest("[data-action='stage-badge']");
        if (!button) return;
        const user = currentUser();
        if (!user || !(user.role === "host" && state.hostId === user.id && user.state === "inside")) return;
        const person = state.people.find((entry) => entry.id === button.dataset.personId);
        if (!person) return;
        state.directStageEditFor = person.id;
        state.directStageValue = String(currentStage(person));
        saveState();
        render();
      });

      app.addEventListener("click", (event) => {
        const action = event.target.closest("[data-action]")?.dataset.action;
        const button = event.target.closest("[data-action]");

        if (!action) return;

        if (action === "goto-signup") {
          state.screen = "signup";
          saveState();
          render();
          return;
        }

        if (action === "goto-login") {
          state.screen = "login";
          saveState();
          render();
          return;
        }

        if (action === "goto-welcome" || action === "back") {
          showLoginScreen();
          return;
        }

        if (action === "reset-website") {
          resetWebsite();
          return;
        }

        if (action === "toggle-menu") {
          state.showMenu = !state.showMenu;
          state.showLogoffPrompt = false;
          saveState();
          render();
          return;
        }

        if (action === "close-menu") {
          state.showMenu = false;
          saveState();
          render();
          return;
        }

        if (action === "close-inspector") {
          state.selectedPlayerId = null;
          saveState();
          render();
          return;
        }

        if (action === "select-player") {
          const current = currentUser();
          const currentIsHost = current && current.role === "host" && state.hostId === current.id;
          if (!currentIsHost) {
            state.selectedPlayerId = null;
            saveState();
            render();
            return;
          }
          const person = state.people.find((entry) => entry.id === button.dataset.playerId);
          if (person) {
            state.selectedPlayerId = person.id;
            saveState();
            render();
          }
          return;
        }

        if (action === "set-tab") {
          const tab = button.dataset.tab;
          state.tab = tab;
          state.showMenu = false;
          saveState();
          render();
          return;
        }

        if (action === "prompt-logoff") {
          state.showMenu = false;
          state.showLogoffPrompt = true;
          saveState();
          render();
          return;
        }

        if (action === "close-logoff") {
          state.showLogoffPrompt = false;
          saveState();
          render();
          return;
        }

        const user = currentUser();
        if (!user) return;

        const isHost = user.role === "host" && state.hostId === user.id;
        const canAddPoints = isHost;

        if (action === "do-leave") {
          markLeft(user);
          return;
        }

        if (action === "do-logoff") {
          if (isHost) {
            markLoggedOff(user);
            return;
          }

          markLoggedOff(user);
          return;
        }

        if (action === "award") {
          if (!canAddPoints) {
            setToast("Only the host can add points.");
            return;
          }
          const person = state.people.find((entry) => entry.id === button.dataset.personId);
          const value = document.getElementById("award-input")?.value;
          if (!person) return;
          awardPoints(person, value);
          return;
        }

        if (action === "toggle-pause") {
          if (!canAddPoints) {
            setToast("Only the host can pause players.");
            return;
          }
          const person = state.people.find((entry) => entry.id === button.dataset.personId);
          if (person) togglePause(person);
          return;
        }

        if (action === "player-leave") {
          if (!canAddPoints) {
            setToast("Only the host can make players leave.");
            return;
          }
          const person = state.people.find((entry) => entry.id === button.dataset.personId);
          if (person) togglePlayerInside(person);
          return;
        }

        if (action === "delete-person") {
          if (!canAddPoints) {
            setToast("Only the host can delete players.");
            return;
          }
          deletePerson(button.dataset.personId);
          return;
        }

        if (action === "restore-person") {
          if (!canAddPoints) {
            setToast("Only the host can add players back.");
            return;
          }
          restorePerson(button.dataset.personId);
          return;
        }

        if (action === "stage-up") {
          if (!canAddPoints) {
            setToast("Only the host can move stages.");
            return;
          }
          const person = state.people.find((entry) => entry.id === button.dataset.personId);
          if (person) stageAdvance(person, currentStage(person) + 1);
          return;
        }

        if (action === "stage-down") {
          if (!canAddPoints) {
            setToast("Only the host can move stages.");
            return;
          }
          const person = state.people.find((entry) => entry.id === button.dataset.personId);
          if (person) stageAdvance(person, currentStage(person) - 1);
          return;
        }

        if (action === "stage-detail") {
          state.stageFocus = Number(button.dataset.stage);
          saveState();
          render();
          return;
        }

        if (action === "do-logoff") {
          markLoggedOff(user);
          return;
        }
      });

      app.addEventListener("input", (event) => {
        const input = event.target;
        if (input.matches("#direct-stage-input")) {
          state.directStageValue = input.value;
        }
      });

      app.addEventListener("submit", (event) => {
        const form = event.target;
        if (form.matches('[data-form="direct-stage"]')) {
          event.preventDefault();
          const user = currentUser();
          if (!user) return;
          const isHost = user.role === "host" && state.hostId === user.id;
          if (!isHost || user.state !== "inside") {
            setToast("Only the host can set a stage directly.");
            return;
          }
          const person = state.people.find((entry) => entry.id === form.dataset.personId);
          const value = Number(form.stage.value);
          if (!person || !Number.isFinite(value)) {
            setToast("Type a valid stage number.");
            return;
          }
          stageAdvance(person, value);
          state.directStageEditFor = null;
          state.directStageValue = "";
          saveState();
          render();
        }
      });

      function renderPlayerInspector(person, isHost, canAddPoints) {
        const stage = currentStage(person);
        const reward = stageReward(stage);
        const stageInfo = stage === 0 ? "Start" : `Stage ${stage} · ${stageRange(stage)} points`;
        const directStageEditOpen = state.directStageEditFor === person.id;
        const inactive = person.state === "logged_off" || person.state === "deleted";

        if (inactive) {
          return `
            <div class="detail-head">
              <div>
                <h3>${escapeHtml(person.name)}</h3>
                <p>${escapeHtml(person.points)} points · ${escapeHtml(stageInfo)}</p>
              </div>
              <button class="icon-btn" data-action="close-inspector" aria-label="Close player inspector">×</button>
            </div>

            <div class="button-row">
              <span class="tag ${person.state === "logged_off" ? "off" : "deleted"}">${escapeHtml(person.state)}</span>
              <span class="tag">player</span>
              ${person.paused ? `<span class="tag paused">paused</span>` : ""}
            </div>

            <div class="divider"></div>
            <div class="detail-actions">
              <button class="cta wide" data-action="restore-person" data-person-id="${person.id}" ${canAddPoints ? "" : "disabled"}>Add</button>
            </div>
          `;
        }

        return `
          <div class="detail-head">
            <div>
              <h3>${escapeHtml(person.name)}</h3>
              <p>${escapeHtml(person.points)} points · ${escapeHtml(stageInfo)}</p>
            </div>
            <button class="icon-btn" data-action="close-inspector" aria-label="Close player inspector">×</button>
          </div>

          <div class="button-row">
            <span class="tag ${person.state === "inside" ? "inside" : person.state === "left" ? "left" : person.state === "logged_off" ? "off" : "deleted"}">${escapeHtml(person.state)}</span>
            <span class="tag ${person.role === "host" && state.hostId === person.id ? "host" : ""}">${escapeHtml(person.role === "host" && state.hostId === person.id ? "host" : "player")}</span>
            ${person.paused ? `<span class="tag paused">paused</span>` : ""}
          </div>

          <div class="divider"></div>

          <div class="detail-actions">
            <div class="action-row">
              <div class="field">
                <label for="award-input">Award points</label>
                <input id="award-input" name="award" type="number" placeholder="Type 5, 7, 8, -5..." ${escapeHtml(canAddPoints ? "" : "disabled")} />
              </div>
              <button class="cta" data-action="award" data-person-id="${person.id}" ${canAddPoints ? "" : "disabled"}>Award</button>
            </div>

            <div class="button-row">
              <button class="secondary cta" data-action="delete-person" data-person-id="${person.id}" ${canAddPoints ? "" : "disabled"}>Delete</button>
              <button class="secondary cta pause-toggle" data-action="toggle-pause" data-person-id="${person.id}" ${canAddPoints ? "" : "disabled"}>${person.paused ? "Resume" : "Pause"}</button>
              <button class="secondary cta" data-action="player-leave" data-person-id="${person.id}" ${canAddPoints ? "" : "disabled"}>${person.state === "left" ? "Inside" : "Leave"}</button>
              <button class="secondary cta" data-action="stage-up" data-person-id="${person.id}" ${canAddPoints ? "" : "disabled"}>↑</button>
              <button class="secondary cta" data-action="stage-badge" data-person-id="${person.id}" title="Double click to type a stage number" ${canAddPoints ? "" : "disabled"}>Stage ${escapeHtml(stage)}</button>
              <button class="secondary cta" data-action="stage-down" data-person-id="${person.id}" ${canAddPoints ? "" : "disabled"}>↓</button>
            </div>

            ${directStageEditOpen && canAddPoints ? `
              <form class="detail-card form-grid" data-form="direct-stage" data-person-id="${person.id}">
                <div class="field">
                  <label for="direct-stage-input">Type a stage number</label>
                  <input id="direct-stage-input" name="stage" value="${escapeHtml(state.directStageValue)}" inputmode="numeric" />
                </div>
                <div class="button-row">
                  <button class="cta" type="submit">Set stage</button>
                  <button class="secondary cta" type="button" data-action="clear-direct-stage">Cancel</button>
                </div>
              </form>
            ` : ""}

            <div class="divider"></div>

            <div class="reward-strip">
              <div class="stats-grid">
                <div class="stats-card">
                  <small>Current stage</small>
                  <strong>${escapeHtml(stage)} / 16</strong>
                </div>
                <div class="stats-card">
                  <small>Reward</small>
                  <strong>${escapeHtml(reward.title)}</strong>
                </div>
              </div>
            </div>
          </div>
        `;
      }

      app.addEventListener("click", (event) => {
        const action = event.target.closest("[data-action]")?.dataset.action;
        if (action === "clear-direct-stage") {
          state.directStageEditFor = null;
          state.directStageValue = "";
          saveState();
          render();
        }
      });

      function hydrateFromSelection() {
        if (!state.people.length) return;
        if (!state.selectedPlayerId || !state.people.some((person) => person.id === state.selectedPlayerId)) {
          const current = currentUser();
          if (current && state.people.some((person) => person.id === current.id)) {
            state.selectedPlayerId = current.id;
          } else {
            const firstVisible = state.people.find((person) => person.state === "inside" || person.state === "left");
            state.selectedPlayerId = firstVisible ? firstVisible.id : null;
          }
        }
      }

      function autoLoginRecovery() {
        const current = currentUser();
        if (!current) return;
        state.screen = "dashboard";
      }

      hydrateFromSelection();
      autoLoginRecovery();
      saveState();
      render();
      startFirebaseSync();

      window.addEventListener("storage", (event) => {
        if (event.key === STORAGE_KEY) {
          syncSharedStateFromStorage();
        }
      });

      window.setInterval(syncSharedStateFromStorage, 1000);
    </script>
  

  </body>
</html>
